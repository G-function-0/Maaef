<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAAEF // CLIENT ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --red: #C41E3A;
            --dark: #050505;
        }

        body {
            background-color: var(--dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }

        .serif {
            font-family: 'Playfair Display', serif;
        }

        /* Video Background */
        #bg-video-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Glossy "Clients" Text */
        .glossy-reveal {
            font-size: clamp(4rem, 12vw, 10rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            background: linear-gradient(to bottom, #fff 30%, rgba(255, 255, 255, 0.4) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.15));
            position: relative;
            z-index: 10;
            transition: opacity 0.8s ease, filter 0.8s ease;
        }

        .glossy-reveal::after {
            content: 'Clients';
            position: absolute;
            left: 0;
            top: 0;
            z-index: -1;
            filter: blur(40px);
            opacity: 0.3;
            background: linear-gradient(to bottom, var(--red) 0%, transparent 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Central Highlight Circle */
        .central-display {
            position: relative;
            width: min(400px, 80vw);
            height: min(400px, 80vw);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            opacity: 0;
            transform: scale(0.9);
        }

        .central-display.active {
            opacity: 1;
            transform: scale(1);
            border-color: var(--red);
            background: rgba(196, 30, 58, 0.05);
            box-shadow: 0 0 40px rgba(196, 30, 58, 0.15);
        }

        .central-display img {
            width: 70%;
            height: 70%;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.1));
            transition: all 0.5s ease;
        }

        /* Carousel Item (Circular) */
        .brand-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(255, 255, 255, 0.02);
            position: relative;
        }

        @media (max-width: 768px) {
            .brand-circle {
                width: 60px;
                height: 60px;
            }
        }

        .brand-circle:hover,
        .brand-circle.active {
            border-color: var(--red);
            background: rgba(196, 30, 58, 0.1);
            box-shadow: 0 0 20px rgba(196, 30, 58, 0.2);
            transform: translateY(-8px);
        }

        .brand-circle img {
            width: 55%;
            height: 55%;
            object-fit: contain;
            opacity: 0.5;
            transition: opacity 0.3s ease, filter 0.3s ease;
        }

        .brand-circle:hover img,
        .brand-circle.active img {
            opacity: 1;
            filter: brightness(1.2);
        }

        .carousel-container {
            position: absolute;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            width: 100%;
            padding: 0 2rem;
            z-index: 20;
        }

        @media (max-width: 768px) {
            .carousel-container {
                gap: 0.5rem;
                bottom: 2vh;
            }
        }

        /* Mute Button Toggle */
        .mute-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
        }

        .mute-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--red);
        }

        /* UI Overlays */
        .page-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        /* Kinetic Menu Styles */
        #kinetic-menu {
            position: fixed;
            inset: 0;
            z-index: 50;
            background-color: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transform: translateY(-100%);
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .menu-link span {
            display: block;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #drawing-canvas-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: auto;
            cursor: crosshair;
        }

        /* Menu Toggle Logo Hover Effect */
        .menu-open #menu-logo-toggle {
            opacity: 1;
            scale: 1;
            pointer-events: auto;
        }

        .menu-open #hamburger-lines {
            opacity: 0;
            scale: 0.5;
            pointer-events: none;
        }

        .menu-toggle-img {
            filter: brightness(0) invert(1);
        }

        button:hover .menu-toggle-img {
            filter: none;
            filter: invert(18%) sepia(91%) saturate(3644%) hue-rotate(338deg) brightness(85%) contrast(93%);
        }

        .menu-open .nav-logo-link {
            opacity: 0;
            pointer-events: none;
        }

        /* Custom Cursor */
        .cursor-dot, .cursor-circle {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 10000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        body.use-custom-cursor .cursor-dot, body.use-custom-cursor .cursor-circle { opacity: 1; }
        .cursor-dot { width: 8px; height: 8px; background: white; }
        .cursor-circle { width: 40px; height: 40px; border: 1px solid rgba(255, 255, 255, 0.5); transition: all 0.3s; }
        body.hovering .cursor-circle { width: 80px; height: 80px; background: rgba(196, 30, 58, 0.5); border-color: transparent; mix-blend-mode: difference; }
    </style>
</head>

<body class="antialiased">

    <div class="cursor-dot"></div>
    <div class="cursor-circle"></div>

    <nav class="fixed top-0 w-full z-[60] px-6 md:px-12 py-8 flex justify-between items-center text-white transition-opacity duration-500"
        id="main-nav">
        <a href="index.html" class="hover-trigger relative z-[60] nav-logo-link transition-opacity duration-300">
            <img src="logo.png" alt="Maaef Logo" class="h-8 w-auto">
        </a>

        <div class="flex items-center gap-6 z-[60]">
            <a href="contact.html"
                class="hidden md:block text-xs uppercase tracking-widest hover:text-red-600 transition hover-trigger font-bold">
                Start Project
            </a>

            <button onclick="toggleMenu()"
                class="group relative flex flex-col items-end justify-center w-12 h-12 hover-trigger p-2">
                <div id="hamburger-lines" class="flex flex-col items-end gap-[6px] w-full transition-all duration-300">
                    <span id="line1" class="w-full h-[2px] bg-white transition-all duration-300 group-hover:w-3/4"></span>
                    <span id="line2" class="w-2/3 h-[2px] bg-white transition-all duration-300 group-hover:w-full"></span>
                </div>
                <div id="menu-logo-toggle"
                    class="absolute inset-0 flex items-center justify-center opacity-0 scale-50 transition-all duration-500 pointer-events-none">
                    <img src="logo.png" alt="Menu Logo" class="h-14 w-auto transition-all duration-300 menu-toggle-img">
                </div>
            </button>
        </div>
    </nav>

    <div id="kinetic-menu" style="isolation: isolate; will-change: transform;" class="hidden bg-[#050505]">
        <canvas id="drawing-canvas-menu"></canvas>
        <div class="absolute inset-0 opacity-20 pointer-events-none z-0"
            style="background-image: url('https://grainy-gradients.vercel.app/noise.svg');"></div>
        <div class="flex flex-col gap-4 text-center relative z-10 pointer-events-none">
            <a href="index.html" onclick="toggleMenu()"
                class="menu-link group relative overflow-hidden inline-block hover-trigger cursor-pointer pointer-events-auto py-2">
                <span class="serif text-6xl md:text-9xl text-white pb-2 md:pb-6 block leading-[1.1] group-hover:-translate-y-[120%]">Home</span>
                <span
                    class="absolute top-0 left-0 serif text-6xl md:text-9xl text-red-600 w-full pb-2 md:pb-6 block leading-[1.1] translate-y-[120%] group-hover:translate-y-0">Home</span>
            </a>
            <a href="about.html" onclick="toggleMenu()"
                class="menu-link group relative overflow-hidden inline-block hover-trigger cursor-pointer pointer-events-auto py-2">
                <span class="serif text-6xl md:text-9xl text-white pb-2 md:pb-6 block leading-[1.1] group-hover:-translate-y-[120%]">Studio</span>
                <span
                    class="absolute top-0 left-0 serif text-6xl md:text-9xl text-red-600 w-full pb-2 md:pb-6 block leading-[1.1] translate-y-[120%] group-hover:translate-y-0">Studio</span>
            </a>
            <a href="services.html" onclick="toggleMenu()"
                class="menu-link group relative overflow-hidden inline-block hover-trigger cursor-pointer pointer-events-auto py-2">
                <span class="serif text-6xl md:text-9xl text-white pb-2 md:pb-6 block leading-[1.1] group-hover:-translate-y-[120%]">Expertise</span>
                <span
                    class="absolute top-0 left-0 serif text-6xl md:text-9xl text-gray-500 w-full pb-2 md:pb-6 block leading-[1.1] translate-y-[120%] group-hover:translate-y-0">Expertise</span>
            </a>
            <a href="contact.html" onclick="toggleMenu()"
                class="menu-link group relative overflow-hidden inline-block hover-trigger cursor-pointer pointer-events-auto py-2">
                <span class="serif text-6xl md:text-9xl text-white pb-2 md:pb-6 block leading-[1.1] group-hover:-translate-y-[120%]">Contact</span>
                <span
                    class="absolute top-0 left-0 serif text-6xl md:text-9xl text-red-600 w-full pb-2 md:pb-6 block leading-[1.1] translate-y-[120%] group-hover:translate-y-0">Contact</span>
            </a>
        </div>
        <div
            class="absolute bottom-28 text-[10px] uppercase tracking-[0.3em] text-neutral-700 animate-pulse pointer-events-none">
            [ LEAVE A TRACE ]
        </div>
        <div
            class="absolute bottom-12 flex justify-between w-full px-12 text-xs uppercase tracking-widest text-gray-600 pointer-events-none">
            <span>26.86478567352451, 81.0101077355821</span>
            <span id="live-clock">0000000000000</span>
        </div>
    </div>

    <div id="bg-video-container">
        <video id="main-video" loop muted playsinline>
            <source src="dummy/dummyvideo.mp4" type="video/mp4">
        </video>
    </div>

    <div class="page-overlay">
        <!-- Initial Display -->
        <h1 id="initial-text" class="glossy-reveal serif cursor-default">Clients</h1>
    </div>

    <!-- Mute Toggle -->
    <button id="mute-btn" class="mute-toggle" title="Toggle Sound">
        <svg id="mute-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <line x1="23" y1="9" x2="17" y2="15"></line>
            <line x1="17" y1="9" x2="23" y2="15"></line>
        </svg>
    </button>

    <!-- Carousel 3-1-3 -->
    <div class="carousel-container pointer-events-auto">
        <!-- 3 Left Brands -->
        <div class="brand-circle brand-item" data-brand="Cyberdyne" data-color="#00ccff"
            data-video="dummy/dummyvideo.mp4">
            <img src="dummy/l1.jpg" alt="Brand 1">
        </div>
        <div class="brand-circle brand-item" data-brand="Weyland" data-color="#ffcc00" data-video="trailer.mp4">
            <img src="dummy/l2.jpg" alt="Brand 2">
        </div>
        <div class="brand-circle brand-item" data-brand="Tyrell" data-color="#ff3300" data-video="dummy/dummyvideo.mp4">
            <img src="dummy/l1.jpg" alt="Brand 3">
        </div>

        <!-- 1 Central Large Display / Maaef Logo -->
        <div id="display-container"
            class="central-display brand-circle active !w-[180px] !h-[180px] md:!w-[240px] md:!h-[240px] pointer-events-none">
            <img id="active-logo" src="logo.png" alt="Maaef" class="!w-[70%] !h-[70%] !opacity-100">
        </div>

        <!-- 3 Right Brands -->
        <div class="brand-circle brand-item" data-brand="Umbrella" data-color="#ffffff" data-video="trailer.mp4">
            <img src="dummy/l2.jpg" alt="Brand 4">
        </div>
        <div class="brand-circle brand-item" data-brand="Aperture" data-color="#3399ff"
            data-video="dummy/dummyvideo.mp4">
            <img src="dummy/l1.jpg" alt="Brand 5">
        </div>
        <div class="brand-circle brand-item" data-brand="Oscorp" data-color="#33ff33" data-video="trailer.mp4">
            <img src="dummy/l2.jpg" alt="Brand 6">
        </div>
    </div>

    <script>
        const video = document.getElementById('main-video');
        const muteBtn = document.getElementById('mute-btn');
        const muteIcon = document.getElementById('mute-icon');
        const initialText = document.getElementById('initial-text');
        const displayContainer = document.getElementById('display-container');
        const activeLogo = document.getElementById('active-logo');
        const bgContainer = document.getElementById('bg-video-container');
        const brandItems = document.querySelectorAll('.brand-item');

        let isMuted = true;
        let interactionStarted = false;

        // Brand interaction
        brandItems.forEach(item => {
            const handleInteract = () => {
                const brandImg = item.querySelector('img').getAttribute('src');
                const brandVideo = item.dataset.video;

                if (!interactionStarted) {
                    interactionStarted = true;
                    // Hide "Clients"
                    gsap.to(initialText, {
                        opacity: 0,
                        y: -50,
                        scale: 0.9,
                        duration: 1.2,
                        ease: "power3.inOut",
                        onComplete: () => {
                            initialText.style.display = 'none';
                        }
                    });

                    // Reveal Background
                    gsap.to(bgContainer, { opacity: 0.35, duration: 2 });
                }

                // Update Display Image with transition
                if (activeLogo.getAttribute('src') !== brandImg) {
                    gsap.to(activeLogo, {
                        opacity: 0,
                        scale: 0.8,
                        duration: 0.3,
                        onComplete: () => {
                            activeLogo.src = brandImg;
                            gsap.to(activeLogo, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.7)" });
                        }
                    });
                }

                // Update Video
                const currentSource = video.querySelector('source').getAttribute('src');
                if (currentSource !== brandVideo) {
                    gsap.to(bgContainer, {
                        opacity: 0, duration: 0.5, onComplete: () => {
                            video.querySelector('source').setAttribute('src', brandVideo);
                            video.load();
                            video.play();
                            gsap.to(bgContainer, { opacity: 0.35, duration: 1 });
                        }
                    });
                } else {
                    video.play();
                }

                // Update active state
                brandItems.forEach(b => b.classList.remove('active'));
                item.classList.add('active');
            };

            item.addEventListener('mouseenter', handleInteract);
            item.addEventListener('click', handleInteract);
        });

        // Mute Toggle Logic
        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            video.muted = isMuted;

            if (isMuted) {
                muteIcon.innerHTML = `
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <line x1="23" y1="9" x2="17" y2="15"></line>
                    <line x1="17" y1="9" x2="23" y2="15"></line>
                `;
            } else {
                muteIcon.innerHTML = `
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                `;
            }
        });

        // Subtle parallax movement on initial text
        document.addEventListener('mousemove', (e) => {
            if (!interactionStarted) {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                gsap.to(initialText, { x: moveX, y: moveY, duration: 0.5 });
            }
        });

        // Navigation Menu Logic
        const dot = document.querySelector('.cursor-dot');
        const circle = document.querySelector('.cursor-circle');
        let cursorEnabled = false;

        document.addEventListener('mousemove', (e) => {
            if (!cursorEnabled) {
                document.body.classList.add('use-custom-cursor');
                cursorEnabled = true;
            }
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
            setTimeout(() => {
                circle.style.left = e.clientX + 'px';
                circle.style.top = e.clientY + 'px';
            }, 50);
        });

        document.querySelectorAll('.hover-trigger').forEach(trigger => {
            trigger.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
            trigger.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
        });

        const menu = document.getElementById('kinetic-menu');
        const canvasMenu = document.getElementById('drawing-canvas-menu');
        const ctxMenu = canvasMenu.getContext('2d');
        let isMenuOpen = false;
        let menuDrawing = false;
        let menuPaths = [];

        function resizeMenuCanvas() {
            canvasMenu.width = window.innerWidth;
            canvasMenu.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeMenuCanvas);
        resizeMenuCanvas();

        window.toggleMenu = function () {
            isMenuOpen = !isMenuOpen;
            if (isMenuOpen) {
                menu.classList.remove('hidden');
                document.body.classList.add('menu-open');
                menu.style.transform = 'translateY(0)';
                requestAnimationFrame(animateMenuDrawing);
            } else {
                document.body.classList.remove('menu-open');
                menu.style.transform = 'translateY(-100%)';
                menuPaths = [];
                ctxMenu.clearRect(0, 0, canvasMenu.width, canvasMenu.height);
                setTimeout(() => menu.classList.add('hidden'), 800);
            }
        };

        canvasMenu.addEventListener('mousedown', (e) => {
            menuDrawing = true;
            menuPaths.push({ points: [{ x: e.clientX, y: e.clientY }], state: 'drawing', opacity: 1, pulseVal: 0, pulseDir: 1, pulseCount: 0 });
        });
        canvasMenu.addEventListener('mousemove', (e) => {
            if (!menuDrawing) return;
            menuPaths[menuPaths.length - 1].points.push({ x: e.clientX, y: e.clientY });
        });
        window.addEventListener('mouseup', () => {
            menuDrawing = false;
            if (menuPaths.length > 0) menuPaths[menuPaths.length - 1].state = 'pulsing';
        });

        function animateMenuDrawing() {
            if (!isMenuOpen) return;
            ctxMenu.clearRect(0, 0, canvasMenu.width, canvasMenu.height);
            ctxMenu.lineCap = 'round';
            ctxMenu.lineJoin = 'round';
            ctxMenu.shadowColor = '#C41E3A';
            for (let i = menuPaths.length - 1; i >= 0; i--) {
                const path = menuPaths[i];
                if (path.points.length < 2) continue;
                if (path.state === 'pulsing') {
                    path.pulseVal += 0.08 * path.pulseDir;
                    if (path.pulseVal >= 1) { path.pulseVal = 1; path.pulseDir = -1; }
                    if (path.pulseVal <= 0) { path.pulseVal = 0; path.pulseDir = 1; path.pulseCount++; }
                    if (path.pulseCount >= 2) path.state = 'fading';
                } else if (path.state === 'fading') {
                    path.opacity -= 0.02;
                }
                let currentWidth = 3 + (path.state !== 'fading' ? path.pulseVal * 5 : 0);
                let currentBlur = 10 + (path.state !== 'fading' ? path.pulseVal * 25 : 0);
                ctxMenu.lineWidth = currentWidth;
                ctxMenu.shadowBlur = currentBlur;
                ctxMenu.strokeStyle = `rgba(255, 255, 255, ${path.opacity})`;
                ctxMenu.beginPath();
                ctxMenu.moveTo(path.points[0].x, path.points[0].y);
                for (let j = 1; j < path.points.length; j++) { ctxMenu.lineTo(path.points[j].x, path.points[j].y); }
                ctxMenu.stroke();
                if (path.opacity <= 0) menuPaths.splice(i, 1);
            }
            requestAnimationFrame(animateMenuDrawing);
        }

        function updateClock() {
            const clockEl = document.getElementById('live-clock');
            if (clockEl) clockEl.innerText = Date.now();
        }
        setInterval(updateClock, 50);
        updateClock();

    </script>
</body>

</html>
