<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Showcase - Working Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>

        @font-face {
            font-family: 'Panchang';
            src: url('dummy/Panchang-Semibold.otf') format('opentype');
            font-weight: 600;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Verdana';
            src: url('dummy/Verdana.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow-x: hidden;
      background: #0a0a0a;
    }

    .container {
      position: relative;
      min-height: 100vh;
      background-color: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem;
      overflow: hidden;
    }

    /* Animated background gradients */
    .video-background {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 0;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    .video-background.active {
      opacity: 1;
    }

    .video-background::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(45deg, var(--brand-color-1), var(--brand-color-2));
      animation: gradientShift 8s ease infinite;
    }

    .video-background::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
    }

    @keyframes gradientShift {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.1) rotate(5deg); }
    }

    .content {
      position: relative;
      z-index: 10;
    }

    .title {
      font-size: 4.5rem;
      color: #ffffff;
      margin-bottom: 5rem;
      text-align: center;
      letter-spacing: 0.02em;
      font-family: 'Panchang', sans-serif;
      font-weight: 400;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4rem 4rem;
    }

    .logo-container {
      position: relative;
      width: 11rem;
      height: 11rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.5s ease-in-out;
    }

    .logo-container.hovered {
      transform: scale(1.15);
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
    }

    .logo-container.dimmed {
      transform: scale(0.85);
      filter: grayscale(100%);
      opacity: 0.3;
    }

    .logo {
      width: 7rem;
      height: 7rem;
    }

    .mute-button {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      transition: background-color 0.2s;
      opacity: 0;
      pointer-events: none;
    }

    .logo-container.hovered .mute-button {
      opacity: 1;
      pointer-events: all;
    }

    .mute-button:hover {
      background-color: rgba(255, 255, 255, 0.25);
    }

    .note {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      backdrop-filter: blur(10px);
      text-align: center;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div class="container">

    <div id="apple-bg" class="video-background" style="--brand-color-1: #555555; --brand-color-2: #333333;"></div>
    <div id="nike-bg" class="video-background" style="--brand-color-1: #FF6B00; --brand-color-2: #cc5500;"></div>
    <div id="adidas-bg" class="video-background" style="--brand-color-1: #000000; --brand-color-2: #333333;"></div>
    <div id="cocacola-bg" class="video-background" style="--brand-color-1: #F40009; --brand-color-2: #c20007;"></div>

          </svg>

            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">

        <!-- Apple -->
        <div class="logo-container" data-brand="apple">

        <!-- Nike -->

        <!-- Adidas -->

            <rect x="28" y="48" width="44" height="7" fill="#FFFFFF" transform="rotate(-18 50 51)" />
            <rect x="34" y="38" width="32" height="7" fill="#FFFFFF" transform="rotate(-18 50 41)" />

            <text x="50" y="56" font-size="16" font-weight="bold" fill="#0a0a0a" text-anchor="middle">SONY</text>
          </svg>
          <button class="mute-button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">

        <!-- Netflix -->
        <div class="logo-container" data-brand="netflix">
          <svg class="logo" viewBox="0 0 100 100">

            <rect x="56" y="28" width="12" height="44" fill="#E50914" />

        <!-- Spotify -->

    </div>

    <div class="note">
      Hover over logos to see animated backgrounds (videos will show here once you add them)
    </div>
  </div>

  <script>
    let currentHovered = null;
    let hoverTimeout = null;
    let activeBg = null;

    const containers = document.querySelectorAll('.logo-container');
    
    containers.forEach(container => {
      container.addEventListener('mouseenter', () => {
        const brand = container.dataset.brand;
        currentHovered = brand;
        
        // Add hover class immediately
        container.classList.add('hovered');
        
        // Dim other logos
        containers.forEach(other => {
          if (other !== container) {
            other.classList.add('dimmed');
          }
        });
        
        // Show background after 0.5s
        clearTimeout(hoverTimeout);
        hoverTimeout = setTimeout(() => {
          if (currentHovered === brand) {
            // Hide previous background
            if (activeBg) {
              activeBg.classList.remove('active');
            }
            
            // Show new background
            const bg = document.getElementById(brand + '-bg');
            if (bg) {
              bg.classList.add('active');
              activeBg = bg;
            }
          }
        }, 500);
      });
      
      container.addEventListener('mouseleave', () => {
        currentHovered = null;
        clearTimeout(hoverTimeout);
        
        // Remove hover classes
        container.classList.remove('hovered');
        containers.forEach(other => {
          other.classList.remove('dimmed');
        });
        
        // Hide background
        if (activeBg) {
          activeBg.classList.remove('active');
          setTimeout(() => {
            if (!currentHovered) {
              activeBg = null;
            }
          }, 500);
        }
      });
    });
  </script>
</body>
</html>
