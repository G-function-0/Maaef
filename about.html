<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maaef Media House | About</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --brand-red: #C41E3A;
            --brand-dark: #050505;
            --bg-color: #050505;
            --text-main: #f4f4f4;
            --text-muted: #888888;
            --border-color: #222222;
            --font-stack: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-stack);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            position: relative;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
        }

        body.use-custom-cursor {
            cursor: none;
        }

        .serif {
            font-family: 'Playfair Display', serif;
        }

        .cursor-dot,
        .cursor-circle {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 10000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        body.use-custom-cursor .cursor-dot,
        body.use-custom-cursor .cursor-circle {
            opacity: 1;
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            background: white;
        }

        .cursor-circle {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: width 0.3s, height 0.3s, background-color 0.3s, opacity 0.3s;
        }

        body.hovering .cursor-circle {
            width: 80px;
            height: 80px;
            background-color: rgba(196, 30, 58, 0.5);
            border-color: transparent;
            mix-blend-mode: difference;
        }

        #kinetic-menu {
            transform: translateY(-100%);
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .menu-link span {
            display: block;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #drawing-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: auto;
            cursor: crosshair;
        }

        /* Menu Toggle Logo Hover Effect */
        .menu-open #menu-logo-toggle {
            opacity: 1;
            scale: 1;
            pointer-events: auto;
        }

        .menu-open #hamburger-lines {
            opacity: 0;
            scale: 0.5;
            pointer-events: none;
        }

        .menu-toggle-img {
            filter: brightness(0) invert(1);
            /* Ensure it's white initially */
        }

        button:hover .menu-toggle-img {
            filter: none;
            /* Reset to original or custom color */
            /* Precise var(--red) filter */
            filter: invert(18%) sepia(91%) saturate(3644%) hue-rotate(338deg) brightness(85%) contrast(93%);
        }

        .menu-open .nav-logo-link {
            opacity: 0;
            pointer-events: none;
        }

        ::-webkit-scrollbar {
            width: 0px;
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .hero-section {
            min-height: 90vh;
            display: flex;
            align-items: center;
            padding: 5vw;
        }

        .manifesto-text {
            font-size: clamp(3.5rem, 8vw, 9rem);
            font-weight: 900;
            line-height: 0.95;
            text-transform: uppercase;
            letter-spacing: -0.03em;
            max-width: 1400px;
            color: #333333;
            cursor: default;
        }

        .manifesto-text span {
            display: block;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .manifesto-text span:hover {
            color: #ffffff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .ticker-section {
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 2rem 0;
            overflow: hidden;
            background: #000;
            white-space: nowrap;
            position: relative;
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }

        .ticker-content {
            display: inline-block;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            animation: scroll-ticker 30s linear infinite;
        }

        .ticker-content span {
            padding: 0 2rem;
            color: var(--text-main);
        }

        @keyframes scroll-ticker {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .founder-section {
            padding: 15vw 5vw;
            max-width: 1600px;
            margin: 0 auto;
        }

        .section-label {
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 4rem;
            display: block;
        }

        .founder-grid {
            display: grid;
            grid-template-columns: 40% 1fr;
            gap: 6rem;
            align-items: start;
        }

        .founder-image-wrapper {
            width: 100%;
            aspect-ratio: 3 / 4;
            background-color: #111;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .founder-image-wrapper::after {
            content: "FOUNDER PORTRAIT (Grayscale / High Contrast)";
            color: #444;
            font-size: 1rem;
            text-align: center;
            padding: 2rem;
            position: absolute;
        }

        .founder-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .founder-quote {
            font-size: clamp(2rem, 4vw, 3.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 2.5rem;
            letter-spacing: -0.02em;
            position: relative;
            z-index: 1;
        }

        .founder-quote::before {
            content: '"';
            position: absolute;
            top: -4rem;
            left: -2.5rem;
            font-size: 8rem;
            color: rgba(255, 255, 255, 0.06);
            font-family: 'Times New Roman', Times, serif;
            z-index: -1;
            line-height: 1;
        }

        .founder-bio {
            font-size: 1.125rem;
            line-height: 1.6;
            color: #b0b0b0;
            max-width: 650px;
        }

        .founder-bio p {
            margin-bottom: 1.5rem;
        }

        .founder-name {
            margin-top: 2rem;
            font-size: 1.25rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-main);
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
            display: inline-block;
        }

        @media (max-width: 900px) {
            .founder-grid {
                grid-template-columns: 1fr;
                gap: 4rem;
            }

            .founder-image-wrapper {
                aspect-ratio: 16 / 9;
            }

            .founder-quote::before {
                top: -3rem;
                left: -1.5rem;
                font-size: 6rem;
            }

            .nav-links {
                display: none;
            }
        }

        /* --- PINHOLE SECTION STYLES --- */
        .pinhole-section {
            position: relative;
            min-height: 100vh;
            background-color: var(--dark);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #pinhole-bg-container {
            position: absolute;
            inset: 0;
            z-index: 1;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        #pinhole-main-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pinhole-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }

        .glossy-reveal {
            font-size: clamp(4rem, 12vw, 10rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            background: linear-gradient(to bottom, #fff 30%, rgba(255, 255, 255, 0.4) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.15));
            position: relative;
            transition: opacity 0.8s ease, filter 0.8s ease;
        }

        .glossy-reveal::after {
            content: 'Clients';
            position: absolute;
            left: 0;
            top: 0;
            z-index: -1;
            filter: blur(40px);
            opacity: 0.3;
            background: linear-gradient(to bottom, var(--brand-red) 0%, transparent 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .central-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            opacity: 0;
            /* Hidden initially, revealed on interaction */
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 15;
            pointer-events: none;
        }

        .central-display.active {
            border-color: var(--brand-red);
            background: rgba(196, 30, 58, 0.05);
            box-shadow: 0 0 40px rgba(196, 30, 58, 0.15);
        }

        .central-display img {
            width: 70%;
            height: 70%;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.1));
            transition: all 0.5s ease;
        }

        .brand-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(255, 255, 255, 0.02);
            position: relative;
        }

        @media (max-width: 768px) {
            .brand-circle {
                width: 60px;
                height: 60px;
            }
        }

        .brand-circle:hover,
        .brand-circle.active {
            border-color: var(--brand-red);
            background: rgba(196, 30, 58, 0.1);
            box-shadow: 0 0 20px rgba(196, 30, 58, 0.2);
            transform: translateY(-8px);
        }

        .brand-circle img {
            width: 55%;
            height: 55%;
            object-fit: contain;
            opacity: 0.5;
            transition: opacity 0.3s ease, filter 0.3s ease;
        }

        .brand-circle:hover img,
        .brand-circle.active img {
            opacity: 1;
            filter: brightness(1.2);
        }

        .pinhole-carousel {
            position: absolute;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            width: 100%;
            padding: 0 2rem;
            z-index: 20;
        }

        @media (max-width: 768px) {
            .pinhole-carousel {
                gap: 0.5rem;
                bottom: 2vh;
            }
        }

        .pinhole-mute-toggle {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
        }

        .pinhole-mute-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--brand-red);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dot = document.querySelector('.cursor-dot');
            const circle = document.querySelector('.cursor-circle');
            let cursorEnabled = false;

            document.addEventListener('mousemove', (e) => {
                if (!cursorEnabled) {
                    document.body.classList.add('use-custom-cursor');
                    cursorEnabled = true;
                }
                dot.style.left = e.clientX + 'px';
                dot.style.top = e.clientY + 'px';

                setTimeout(() => {
                    circle.style.left = e.clientX + 'px';
                    circle.style.top = e.clientY + 'px';
                }, 50);
            });

            document.querySelectorAll('.hover-trigger').forEach(trigger => {
                trigger.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
                trigger.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
            });

            const menu = document.getElementById('kinetic-menu');
            const canvas = document.getElementById('drawing-canvas');
            const ctx = canvas.getContext('2d');
            let isMenuOpen = false;
            let drawing = false;
            let paths = [];

            function resizeCanvas() {
                if (!canvas) return;
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            window.toggleMenu = function () {
                isMenuOpen = !isMenuOpen;

                if (isMenuOpen) {
                    document.body.classList.add('menu-open');
                    menu.style.transform = 'translateY(0)';
                    requestAnimationFrame(animateDrawing);
                } else {
                    document.body.classList.remove('menu-open');
                    menu.style.transform = 'translateY(-100%)';
                    paths = [];
                    if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            };

            if (canvas) {
                canvas.addEventListener('mousedown', (e) => {
                    drawing = true;
                    paths.push({ points: [{ x: e.clientX, y: e.clientY }], state: 'drawing', opacity: 1, pulseVal: 0, pulseDir: 1, pulseCount: 0 });
                });
                canvas.addEventListener('mousemove', (e) => {
                    if (!drawing) return;
                    paths[paths.length - 1].points.push({ x: e.clientX, y: e.clientY });
                });
                window.addEventListener('mouseup', () => {
                    drawing = false;
                    if (paths.length > 0) paths[paths.length - 1].state = 'pulsing';
                });
            }

            function animateDrawing() {
                if (!isMenuOpen || !ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowColor = '#C41E3A';

                for (let i = paths.length - 1; i >= 0; i--) {
                    const path = paths[i];
                    if (path.points.length < 2) continue;

                    if (path.state === 'pulsing') {
                        path.pulseVal += 0.08 * path.pulseDir;
                        if (path.pulseVal >= 1) { path.pulseVal = 1; path.pulseDir = -1; }
                        if (path.pulseVal <= 0) { path.pulseVal = 0; path.pulseDir = 1; path.pulseCount++; }
                        if (path.pulseCount >= 2) path.state = 'fading';
                    } else if (path.state === 'fading') {
                        path.opacity -= 0.02;
                    }

                    let currentWidth = 3;
                    let currentBlur = 10;
                    if (path.state === 'drawing' || path.state === 'pulsing') {
                        currentWidth += path.pulseVal * 5;
                        currentBlur += path.pulseVal * 25;
                    }

                    ctx.lineWidth = currentWidth;
                    ctx.shadowBlur = currentBlur;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${path.opacity})`;

                    ctx.beginPath();
                    ctx.moveTo(path.points[0].x, path.points[0].y);
                    for (let j = 1; j < path.points.length; j++) { ctx.lineTo(path.points[j].x, path.points[j].y); }
                    ctx.stroke();

                    if (path.opacity <= 0) paths.splice(i, 1);
                }
                requestAnimationFrame(animateDrawing);
            }

            function updateClock() {
                const clockEl = document.getElementById('live-clock');
                if (clockEl) {
                    clockEl.innerText = Date.now();
                }
            }
            setInterval(updateClock, 50);
            updateClock();

            // --- PINHOLE BRAND SHOWCASE LOGIC ---
            const pinholeVideo = document.getElementById('pinhole-main-video');
            const pinholeMuteBtn = document.getElementById('pinhole-mute-btn');
            const pinholeMuteIcon = document.getElementById('pinhole-mute-icon');
            const pinholeInitialText = document.getElementById('pinhole-initial-text');
            const pinholeDisplayContainer = document.getElementById('pinhole-display-container');
            const pinholeActiveLogo = document.getElementById('pinhole-active-logo');
            const pinholeBgContainer = document.getElementById('pinhole-bg-container');
            const pinholeBrandItems = document.querySelectorAll('.pinhole-brand-item');

            let pinholeIsMuted = true;
            let pinholeInteractionStarted = false;

            if (pinholeBrandItems.length > 0) {
                pinholeBrandItems.forEach(item => {
                    const handlePinholeInteract = () => {
                        const brandImg = item.querySelector('img').getAttribute('src');
                        const brandVideo = item.dataset.video;

                        if (!pinholeInteractionStarted) {
                            pinholeInteractionStarted = true;
                            // Hide "Clients"
                            gsap.to(pinholeInitialText, {
                                opacity: 0,
                                y: -50,
                                scale: 0.9,
                                duration: 1.2,
                                ease: "power3.inOut",
                                onComplete: () => {
                                    pinholeInitialText.style.display = 'none';
                                }
                            });

                            // Reveal Central Circle
                            gsap.to(pinholeDisplayContainer, { opacity: 1, duration: 1.2, ease: "power2.out", delay: 0.4 });

                            // Reveal Background
                            gsap.to(pinholeBgContainer, { opacity: 0.35, duration: 2 });
                        }

                        // Update Display Image with transition
                        if (pinholeActiveLogo.getAttribute('src') !== brandImg) {
                            gsap.to(pinholeActiveLogo, {
                                opacity: 0,
                                scale: 0.8,
                                duration: 0.3,
                                onComplete: () => {
                                    pinholeActiveLogo.src = brandImg;
                                    gsap.to(pinholeActiveLogo, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.7)" });
                                }
                            });
                        }

                        // Update Video
                        if (pinholeVideo && pinholeVideo.querySelector('source')) {
                            const currentSource = pinholeVideo.querySelector('source').getAttribute('src');
                            if (currentSource !== brandVideo) {
                                gsap.to(pinholeBgContainer, {
                                    opacity: 0, duration: 0.5, onComplete: () => {
                                        pinholeVideo.querySelector('source').setAttribute('src', brandVideo);
                                        pinholeVideo.load();
                                        pinholeVideo.play();
                                        gsap.to(pinholeBgContainer, { opacity: 0.35, duration: 1 });
                                    }
                                });
                            } else {
                                if (pinholeVideo.paused) pinholeVideo.play();
                            }
                        }

                        // Update active state
                        pinholeBrandItems.forEach(b => b.classList.remove('active'));
                        item.classList.add('active');
                    };

                    item.addEventListener('mouseenter', handlePinholeInteract);
                    item.addEventListener('click', handlePinholeInteract);
                });
            }

            // Pinhole Mute Toggle Logic
            if (pinholeMuteBtn) {
                pinholeMuteBtn.addEventListener('click', () => {
                    pinholeIsMuted = !pinholeIsMuted;
                    pinholeVideo.muted = pinholeIsMuted;

                    if (pinholeIsMuted) {
                        pinholeMuteIcon.innerHTML = `
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                            <line x1="23" y1="9" x2="17" y2="15"></line>
                            <line x1="17" y1="9" x2="23" y2="15"></line>
                        `;
                    } else {
                        pinholeMuteIcon.innerHTML = `
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        `;
                    }
                });
            }

            // Subtle parallax movement on initial text
            document.addEventListener('mousemove', (e) => {
                if (!pinholeInteractionStarted && pinholeInitialText) {
                    const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                    const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                    gsap.to(pinholeInitialText, { x: moveX, y: moveY, duration: 0.5 });
                }
            });
        });
    </script>

</body>
